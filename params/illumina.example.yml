# OncoTracer Illumina example configuration.
# Recommended first choice: let --auto_params generate this file for you.
# Manual use: cp params/illumina.example.yml params/my_illumina.yml
#
# YAML uses `setting: value`, one setting per line. Use spaces, never tabs.
# Replace /home/student/oncotracer with the absolute path printed by `pwd`.
# Keep the samplesheet and output directory below lpwgs_root.

mode: illumina

# Absolute common parent mounted into Docker or Singularity.
lpwgs_root: /home/student/oncotracer

# Results are written here. OncoTracer creates 01_ through 06_ subdirectories.
outdir: /home/student/oncotracer/project/runs/illumina_example

# CSV columns: sample,fastq_1,fastq_2,status
# Example row (the paths must exist):
# Sample_A,/home/student/oncotracer/project/input/illumina_fastq/Sample_A_R1.fastq.gz,/home/student/oncotracer/project/input/illumina_fastq/Sample_A_R2.fastq.gz,tumor
illumina_samplesheet: /home/student/oncotracer/project/input/illumina.samplesheet.csv

# Standard Illumina scientific settings. Omit these lines to use the same defaults.
illumina_analysis_type: solid_biopsy
illumina_caller: qdnaseq
illumina_binsize_kb: 100

# Optional CNA classifier and pathology report. Leave false for the standard run.
run_cna_classifier: false
cna_classifier_sample_set: broad_cancer
pathology_csv: null
pathology_sample_col: illumina_sample_id
pathology_case_col: case_code
pathology_diagnosis_col: final_diagnosis
pathology_use_biomed_models: true
pathology_biomed_local_files_only: false

# Protect an existing real-project output directory.
force: false
