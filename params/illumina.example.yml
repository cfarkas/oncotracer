# OncoTracer Illumina example configuration.
# Copy before editing: cp params/illumina.example.yml params/my_illumina.yml
# YAML is plain text: setting_name: value. Use spaces, not tabs.
# Use real Linux absolute paths from commands such as:
#   pwd
#   realpath .
#   realpath data/sample_R1.fastq.gz
#   ls -lh /home/student/data/sample_R1.fastq.gz

mode: illumina

# Absolute project/data root visible to Docker or Singularity.
lpwgs_root: /home/student/oncotracer_project

# Main output folder for numbered OncoTracer directories.
outdir: /home/student/oncotracer_project/runs/illumina_example

# CSV with columns: sample,fastq_1,fastq_2,status
# Example row:
# Sample_A,/home/student/data/Sample_A_R1.fastq.gz,/home/student/data/Sample_A_R2.fastq.gz,tumor
illumina_samplesheet: /home/student/oncotracer_project/input/illumina_samplesheet.csv


# Scientific defaults for the standard Illumina route.
illumina_analysis_type: solid_biopsy
illumina_caller: qdnaseq
illumina_binsize_kb: 100

# Optional classifier/pathology route.
run_cna_classifier: false
cna_classifier_sample_set: broad_cancer
pathology_csv: null
pathology_sample_col: illumina_sample_id
pathology_case_col: case_code
pathology_diagnosis_col: final_diagnosis
pathology_use_biomed_models: true
pathology_biomed_local_files_only: false

force: true
