# Illumina FASTQ example configuration for OncoTracer.
#
# What is YAML?
# YAML is a plain-text settings file. Each setting is written as:
#   setting_name: value
# Edit the value after the colon. Use real absolute paths. Do not use tabs.

# Workflow branch. Use "illumina" for Illumina paired-end LP-WGS FASTQ files.
mode: illumina

# Root folder for this project/data area. Docker/Singularity bind this folder by default.
lpwgs_root: /media/server/STORAGE/LPWGS_2025

# Main output folder. OncoTracer writes numbered result folders inside this path.
outdir: /media/server/STORAGE/LPWGS_2025/CNA_analyses/OncoTracer_illumina_fastq_test

# CSV samplesheet describing your Illumina FASTQ files.
# Required columns: sample,fastq_1,fastq_2,status
# Use status=tumor for tumor-only LP-WGS.
illumina_samplesheet: /media/server/STORAGE/LPWGS_2025/samurai_input/samplesheet.csv

# Folder where the upstream SAMURAI/qDNAseq Illumina step will write results.
illumina_samurai_outdir: /media/server/STORAGE/LPWGS_2025/CNA_analyses/OncoTracer_illumina_fastq_test/01_samurai_illumina

# SAMURAI settings for Illumina LP-WGS CNA calling.
illumina_analysis_type: solid_biopsy
illumina_caller: qdnaseq
illumina_binsize_kb: 100

# Set true to run CNA classifier, reports, and optional pathology concordance.
run_cna_classifier: false

# Optional pathology table. Keep null for standard CNA-only runs.
pathology_csv: null
pathology_sample_col: illumina_sample_id
pathology_case_col: case_code
pathology_diagnosis_col: final_diagnosis
pathology_use_biomed_models: true
pathology_biomed_local_files_only: false

# Allow underlying steps to overwrite/recompute outputs in the selected outdir.
force: true
