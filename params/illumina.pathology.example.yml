# OncoTracer Illumina + pathology example configuration.
# Copy before editing: cp params/illumina.pathology.example.yml params/my_illumina_pathology.yml

mode: illumina
lpwgs_root: /home/student/oncotracer_project
outdir: /home/student/oncotracer_project/runs/illumina_pathology_example

illumina_samplesheet: /home/student/oncotracer_project/input/illumina_samplesheet.csv
illumina_samurai_outdir: /home/student/oncotracer_project/runs/illumina_pathology_example/01_samurai_illumina
illumina_analysis_type: solid_biopsy
illumina_caller: qdnaseq
illumina_binsize_kb: 100

run_cna_classifier: true
cna_classifier_sample_set: broad_cancer
cna_classifier_profile: conda

# Pathology CSV and column names. Sample IDs must match OncoTracer sample names.
pathology_csv: /home/student/oncotracer_project/input/pathology.csv
pathology_sample_col: illumina_sample_id
pathology_case_col: case_code
pathology_diagnosis_col: final_diagnosis
pathology_use_biomed_models: true
pathology_biomed_local_files_only: false

force: true
