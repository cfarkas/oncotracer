# Illumina FASTQ + pathology example configuration for OncoTracer.
#
# Copy this file, edit the paths, then run with --docker, --singularity, or --conda.
# YAML uses setting_name: value. Edit only the values unless you know what you are changing.

mode: illumina
lpwgs_root: /media/server/STORAGE/LPWGS_2025
outdir: /media/server/STORAGE/LPWGS_2025/CNA_analyses/OncoTracer_illumina_pathology_test

# Illumina paired-end FASTQ samplesheet.
# Columns: sample,fastq_1,fastq_2,bam,gender,status
illumina_samplesheet: /media/server/STORAGE/LPWGS_2025/samurai_input/samplesheet.csv
illumina_samurai_outdir: /media/server/STORAGE/LPWGS_2025/CNA_analyses/OncoTracer_illumina_pathology_test/01_samurai_illumina
illumina_analysis_type: solid_biopsy
illumina_caller: qdnaseq
illumina_binsize_kb: 100

# Enable classifier/report/pathology outputs.
run_cna_classifier: true

# Pathology CSV file and column names.
# The sample column must match the OncoTracer/Illumina sample names.
pathology_csv: /path/to/pathology.csv
pathology_sample_col: illumina_sample_id
pathology_case_col: case_code
pathology_diagnosis_col: final_diagnosis

# Biomedical-model concordance options. Set local_files_only true on offline machines.
pathology_use_biomed_models: true
pathology_biomed_local_files_only: false
force: true
