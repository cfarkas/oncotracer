# OncoTracer ONT example configuration.
# Copy before editing: cp params/ont.example.yml params/my_ont.yml
# Use Linux absolute paths. Windows paths such as C:\Users\Name\data are not
# Linux paths; in WSL use /mnt/c/Users/Name/data or /home/name/data.

mode: ont
lpwgs_root: /home/student/oncotracer_project
outdir: /home/student/oncotracer_project/runs/ont_example

# Folder containing ONT FASTQ files or barcode folders.
# Check with: find /home/student/data/ont_run/fastq_pass -maxdepth 2 -type f | head
ont_folder: /home/student/data/ont_run/fastq_pass

# Comma-separated barcode IDs; order must match ont_sample_names.
ont_barcodes: barcode07,barcode08
ont_sample_names: Sample_ONT_1,Sample_ONT_2


# Scientific defaults for the standard ONT route.
ont_analysis_type: liquid_biopsy
ont_caller: ichorcna
ont_binsize_kb: 500
ont_min_age_minutes: 0

# Optional advanced ONT inputs.
ont_ref: null
ont_normal_folder: null
ont_normal_barcodes: null
ont_normal_sample_names: null
ont_build_pon: false
ont_force_realign: false

run_cna_classifier: false
force: true
