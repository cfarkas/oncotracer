name: cna_classifier_nf
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pandas>=2.0
  - openpyxl>=3.1
  - numpy>=1.24
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - jinja2>=3.1
  - requests>=2.31
  - reportlab>=4.0
  - pypdf>=4.0

  # Optional biomedical transformer layer for --pathology agreement scoring.
  # These packages allow the pipeline to try BiomedBERT/BioBERT/Bio_ClinicalBERT locally.
  # Disable with --pathology_use_biomed_models false if you want a lighter run.
  - pip
  - pip:
      - transformers>=4.42
      - torch>=2.2
      - safetensors>=0.4
      - huggingface_hub>=0.23
