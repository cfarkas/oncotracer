<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700" role="img" aria-labelledby="title desc">
  <title id="title">Example terminal after preparing the OncoTracer QuickStart</title>
  <desc id="desc">Terminal-style screenshot showing a beginner cloning OncoTracer into home student oncotracer, entering that directory, and running nextflow run main dot nf dash dash make test. The screen confirms that public FASTQ test data and two YAML files are ready under the test folder, and that no copy-number analysis has started.</desc>
  <defs><linearGradient id="header" x1="0" x2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#134e4a"/></linearGradient><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity=".18"/></filter></defs>
  <style>.h1{font:700 32px system-ui,sans-serif;fill:#f8fafc}.lead{font:18px system-ui,sans-serif;fill:#cbd5e1}.term{font:17px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#e2e8f0}.prompt{fill:#5eead4}.output{fill:#cbd5e1}.success{fill:#86efac;font-weight:700}.label{font:700 15px system-ui,sans-serif;fill:#0f766e;letter-spacing:.08em}.body{font:17px system-ui,sans-serif;fill:#334155}.file{font:16px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#334155}.banner{font:700 18px system-ui,sans-serif;fill:#115e59}</style>
  <rect width="1400" height="700" fill="#f1f5f9"/><rect width="1400" height="112" fill="url(#header)"/>
  <text class="h1" x="54" y="47">What preparation looks like in the terminal</text><text class="lead" x="54" y="79">Type only the lines after the $ prompt. The lines below them are example output.</text>
  <g filter="url(#shadow)"><rect x="54" y="145" width="900" height="445" rx="15" fill="#0b1220"/></g>
  <rect x="54" y="145" width="900" height="48" rx="15" fill="#1e293b"/><rect x="54" y="178" width="900" height="15" fill="#1e293b"/>
  <circle cx="83" cy="169" r="7" fill="#fb7185"/><circle cx="107" cy="169" r="7" fill="#fbbf24"/><circle cx="131" cy="169" r="7" fill="#4ade80"/>
  <text x="392" y="176" font-family="system-ui,sans-serif" font-size="15" fill="#cbd5e1">student — Terminal</text>
  <text class="term prompt" x="82" y="218">student@workstation:~$</text><text class="term" x="300" y="218">git clone https://github.com/cfarkas/oncotracer.git \</text>
  <text class="term" x="110" y="246">/home/student/oncotracer</text>
  <text class="term output" x="82" y="275">Cloning into '/home/student/oncotracer'...</text>
  <text class="term prompt" x="82" y="306">student@workstation:~$</text><text class="term" x="300" y="306">cd /home/student/oncotracer</text>
  <text class="term prompt" x="82" y="338">student@workstation:~/oncotracer$</text><text class="term" x="388" y="338">nextflow run \</text>
  <text class="term" x="110" y="366">/home/student/oncotracer/main.nf --make_test \</text>
  <text class="term" x="110" y="394">--test_root /home/student/oncotracer/test</text>
  <text class="term success" x="82" y="428">[a3/1f8306] process &gt; MAKE_TEST_DATA (public_quickstart_data) [100%] 1 of 1 ✔</text>
  <text class="term prompt" x="82" y="461">student@workstation:~/oncotracer$</text><text class="term" x="388" y="461">find /home/student/oncotracer/test/configs \</text>
  <text class="term" x="110" y="489">-maxdepth 1 -type f -print</text>
  <text class="term output" x="82" y="523">/home/student/oncotracer/test/configs/illumina.quickstart.yml</text>
  <text class="term output" x="82" y="551">/home/student/oncotracer/test/configs/ont.quickstart.yml</text>
  <text x="82" y="578" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">The characters in brackets, progress layout, and DOWNLOAD/REUSE lines can differ.</text>

  <g filter="url(#shadow)"><rect x="990" y="145" width="356" height="445" rx="15" fill="#fff"/></g>
  <text class="label" x="1018" y="187">FILES TO EXPECT</text><text x="1018" y="224" font-family="system-ui,sans-serif" font-size="23" font-weight="700" fill="#0f172a">Preparation created</text>
  <path d="M1021 258h18l6 7h28v25h-52z" fill="#fbbf24" stroke="#d97706"/><text class="file" x="1085" y="278">test/</text>
  <path d="M1042 304v156M1042 328h25M1042 376h25M1042 424h25" stroke="#94a3b8" stroke-width="1.5"/>
  <text class="file" x="1076" y="334">public/</text><text class="body" x="1076" y="356">checked example reads</text>
  <text class="file" x="1076" y="382">configs/</text><text class="file" x="1096" y="407">illumina.quickstart.yml</text>
  <text class="file" x="1096" y="431">ont.quickstart.yml</text>
  <text class="file" x="1076" y="465">runs/</text><text class="body" x="1076" y="487">empty until real runs</text>
  <rect x="1018" y="516" width="300" height="46" rx="10" fill="#fffbeb" stroke="#fbbf24"/><text x="1037" y="545" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#92400e">No CNA analysis has started yet.</text>

  <rect x="54" y="622" width="1292" height="48" rx="12" fill="#ccfbf1"/><text class="banner" x="82" y="652">Next step: inspect one generated YAML, then use it with -params-file to start the real analysis.</text>
</svg>
