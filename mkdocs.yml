site_name: OncoTracer
site_description: Reproducible LP-WGS CNA analysis for ONT and Illumina data
site_author: OncoTracer developers
site_url: https://cfarkas.github.io/oncotracer/
repo_name: cfarkas/oncotracer
repo_url: https://github.com/cfarkas/oncotracer
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Start Here:
      - Before You Begin: getting_started/before_you_begin.md
      - What Is a Path?: getting_started/paths.md
      - Install OncoTracer: installation.md
      - First Illumina Run: getting_started/first_illumina_run.md
      - First ONT Run: getting_started/first_ont_run.md
      - Public Example Data: example_data.md
  - Configuration:
      - YAML Basics: configuration/yaml_basics.md
      - Illumina YAML: configuration/illumina.md
      - ONT YAML: configuration/ont.md
      - Pathology and Classifier: configuration/pathology.md
      - Advanced Refinement Settings: configuration/refinement.md
      - Complete Parameter Reference: configuration/parameter_reference.md
  - Input Files: inputs.md
  - Workflow Overview: running.md
  - Output Files: outputs.md
  - Troubleshooting: troubleshooting.md
  - Citation and Research-Use Limitations: citation_research_use.md
  - Developer Guide: developer_guide.md
  - Gallery: gallery.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
