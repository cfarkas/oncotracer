site_name: OncoTracer
site_description: Reproducible LP-WGS CNA analysis for ONT and Illumina data
site_author: OncoTracer developers
site_url: https://cfarkas.github.io/oncotracer/
repo_name: cfarkas/oncotracer
repo_url: https://github.com/cfarkas/oncotracer
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick_start.md
  - YAML and Paths: configuration/yaml_basics.md
  - Configuration:
      - Illumina: configuration/illumina.md
      - ONT: configuration/ont.md
      - Pathology and Classifier: configuration/pathology.md
      - Advanced Refinement: configuration/refinement.md
      - Parameter Reference: configuration/parameter_reference.md
  - Input Files: inputs.md
  - Workflow Overview: running.md
  - Output Files: outputs.md
  - Models & Pathology: models_pathology.md
  - Gallery: gallery.md
  - Troubleshooting: troubleshooting.md
  - Citation and Research Use: citation_research_use.md
  - Developer Guide: developer_guide.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
