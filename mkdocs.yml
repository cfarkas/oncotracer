site_name: OncoTracer
site_description: Reproducible LP-WGS CNA analysis for ONT and Illumina data
site_author: OncoTracer developers
# GitHub Pages is the active public documentation site.
# TODO: switch to a ReadTheDocs URL only after the RTD project exists.
site_url: https://cfarkas.github.io/oncotracer/
repo_name: cfarkas/oncotracer
repo_url: https://github.com/cfarkas/oncotracer
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Quick Start: quick_start.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Inputs: inputs.md
  - Running OncoTracer: running.md
  - Tutorial: tutorial_our_runs.md
  - Outputs: outputs.md
  - Models & Pathology: models_pathology.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
