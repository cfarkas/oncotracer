site_name: OncoTracer
site_description: Reproducible LP-WGS CNA analysis for ONT and Illumina data
site_author: OncoTracer developers
site_url: https://cfarkas.github.io/oncotracer/
repo_name: cfarkas/oncotracer
repo_url: https://github.com/cfarkas/oncotracer
edit_uri: edit/main/docs/

extra_css:
  - stylesheets/oncotracer.css

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit
    - navigation.tabs
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting Started:
      - 1. Install Requirements: installation.md
      - 2. Quick Verification: quick_start.md
      - 3. Automatic Setup for Your FASTQs (Recommended): auto_params.md
      - 4. Three-Sample Public Cohort: public_cohort.md
      - Input Files and Folder Layouts: inputs.md
      - Manual YAML Editing (Second Option): configuration/yaml_basics.md
  - Full Tutorial: full_tutorial.md
  - Run and Configure:
      - Workflow Overview: running.md
      - Illumina Setup: configuration/illumina.md
      - ONT Setup: configuration/ont.md
      - Pathology and Classifier: configuration/pathology.md
      - Advanced Refinement: configuration/refinement.md
      - All Parameters: configuration/parameter_reference.md
  - Understand Results:
      - Output Files: outputs.md
      - Models and Pathology: models_pathology.md
      - Results Gallery: gallery.md
  - Help and About:
      - Troubleshooting: troubleshooting.md
      - Citation and Research Use: citation_research_use.md
      - Developer Guide: developer_guide.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
