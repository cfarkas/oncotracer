<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">PRJNA754199 Automatic Setup checkpoint</title>
  <desc id="desc">Terminal-style screenshot showing Automatic Setup completed one of one tasks and a list of illumina dot auto dot yml and illumina dot samplesheet dot csv. Labels explain that the YAML stores paths and analysis choices while the samplesheet connects the 12 sample names to FASTQ files. No reads have been analyzed.</desc>
  <defs><linearGradient id="header" x1="0" x2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#134e4a"/></linearGradient><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity=".18"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#0f766e"/></marker></defs>
  <style>.h1{font:700 32px system-ui,sans-serif;fill:#f8fafc}.lead{font:18px system-ui,sans-serif;fill:#cbd5e1}.term{font:17px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#e2e8f0}.prompt{fill:#5eead4}.success{fill:#86efac;font-weight:700}.label{font:700 15px system-ui,sans-serif;fill:#0f766e;letter-spacing:.08em}.body{font:16px system-ui,sans-serif;fill:#334155}.small{font:14px system-ui,sans-serif;fill:#64748b}.note{font:700 17px system-ui,sans-serif;fill:#92400e}</style>
  <rect width="1400" height="620" fill="#f1f5f9"/><rect width="1400" height="112" fill="url(#header)"/><text class="h1" x="54" y="47">Checkpoint: the 12-sample run is configured</text><text class="lead" x="54" y="79">Automatic Setup creates two small text files. They prepare the next command; they are not analysis results.</text>
  <g filter="url(#shadow)"><rect x="54" y="145" width="790" height="410" rx="15" fill="#0b1220"/></g><rect x="54" y="145" width="790" height="48" rx="15" fill="#1e293b"/><rect x="54" y="178" width="790" height="15" fill="#1e293b"/><circle cx="83" cy="169" r="7" fill="#fb7185"/><circle cx="107" cy="169" r="7" fill="#fbbf24"/><circle cx="131" cy="169" r="7" fill="#4ade80"/><text x="345" y="176" font-family="system-ui,sans-serif" font-size="15" fill="#cbd5e1">student — Terminal</text>
  <text class="term success" x="82" y="238">[35/f0db6a] process &gt; AUTO_PARAMS (auto_params) [100%] 1 of 1 ✔</text>
  <text class="term prompt" x="82" y="291">student@workstation:~/oncotracer$</text><text class="term" x="389" y="291">ls -1 \</text><text class="term" x="110" y="324">/home/student/oncotracer/test/configs/prjna754199</text>
  <text class="term success" x="82" y="374">illumina.auto.yml</text><text class="term success" x="82" y="412">illumina.samplesheet.csv</text>
  <text x="82" y="458" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">The characters in brackets and progress layout can differ between Nextflow versions.</text>
  <rect x="82" y="486" width="734" height="43" rx="9" fill="#3f2f0b" stroke="#fbbf24"/><text x="102" y="513" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fde68a">No reads have been analyzed. The real run is the next tutorial step.</text>
  <path d="M856 374 H918" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/><path d="M856 412 H918" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="930" y="145" width="416" height="410" rx="15" fill="#fff"/></g><text class="label" x="958" y="188">WHAT THE FILES MEAN</text>
  <rect x="958" y="216" width="360" height="116" rx="12" fill="#fffbeb" stroke="#fbbf24"/><text x="980" y="248" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="16" font-weight="700" fill="#92400e">illumina.auto.yml</text><text class="body" x="980" y="280">Stores the checked paths, caller,</text><text class="body" x="980" y="305">settings, and final results folder.</text>
  <rect x="958" y="354" width="360" height="116" rx="12" fill="#eff6ff" stroke="#93c5fd"/><text x="980" y="386" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="16" font-weight="700" fill="#1d4ed8">illumina.samplesheet.csv</text><text class="body" x="980" y="418">Connects each of the 12 sample</text><text class="body" x="980" y="443">names to its downloaded FASTQ.</text>
  <text class="small" x="958" y="512">The next command supplies the YAML with</text><text class="small" x="958" y="533">-params-file and starts the real workflow.</text>
</svg>
