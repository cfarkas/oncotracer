<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Complete PRJNA754199 OncoTracer tutorial flow</title>
  <desc id="desc">Six-action flowchart matching tutorial sections one through seven. Sections one and two plan the run and prepare software, section three downloads and validates 12 single-end FASTQ files, section four creates a samplesheet and YAML run plan, section five runs the real analysis, section six verifies outputs, and section seven reviews plots, statistics, and research interpretation.</desc>
  <defs><linearGradient id="header" x1="0" x2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#134e4a"/></linearGradient><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity=".13"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#0f766e"/></marker></defs>
  <style>.h1{font:700 34px system-ui,sans-serif;fill:#f8fafc}.lead{font:18px system-ui,sans-serif;fill:#cbd5e1}.num{font:700 18px system-ui,sans-serif;fill:#fff}.title{font:700 21px system-ui,sans-serif;fill:#0f172a}.body{font:15.5px system-ui,sans-serif;fill:#475569}.code{font:14px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#334155}.lane{font:700 14px system-ui,sans-serif;fill:#0f766e;letter-spacing:.1em}.banner{font:700 18px system-ui,sans-serif;fill:#115e59}</style>
  <rect width="1400" height="760" fill="#f1f5f9"/><rect width="1400" height="112" fill="url(#header)"/>
  <text class="h1" x="54" y="47">Full Tutorial: from public archive to checked results</text><text class="lead" x="54" y="79">Follow the numbered sections in order. Each checkpoint confirms that the previous step finished.</text>
  <text class="lane" x="54" y="150">PREPARATION</text><line x1="54" y1="164" x2="1346" y2="164" stroke="#99f6e4" stroke-width="3"/>
  <g filter="url(#shadow)"><rect x="54" y="187" width="372" height="190" rx="16" fill="#fff"/></g><circle cx="91" cy="225" r="22" fill="#0f766e"/><text x="78" y="231" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">1–2</text><text class="title" x="126" y="231">Plan + prepare software</text>
  <rect x="78" y="257" width="324" height="44" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/><text class="code" x="94" y="284">main.nf --install --docker</text><text class="body" x="78" y="329">Choose resources and check the runtime.</text><text class="body" x="78" y="352">No patient reads are downloaded.</text>
  <path d="M438 282 H478" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="492" y="187" width="372" height="190" rx="16" fill="#fff"/></g><circle cx="529" cy="225" r="22" fill="#0f766e"/><text class="num" x="523" y="232">3</text><text class="title" x="564" y="231">Download and validate</text>
  <text class="body" x="516" y="273">12 public single-end FASTQs</text><text class="body" x="516" y="298">+ samples.csv</text><rect x="516" y="317" width="324" height="36" rx="8" fill="#eff6ff" stroke="#93c5fd"/><text class="code" x="533" y="341">sizes + MD5 + readable gzip</text>
  <path d="M876 282 H916" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="930" y="187" width="416" height="190" rx="16" fill="#fffbeb" stroke="#f59e0b" stroke-width="3"/></g><circle cx="967" cy="225" r="22" fill="#d97706"/><text class="num" x="961" y="232">4</text><text class="title" x="1002" y="231">Automatic Setup</text>
  <text class="body" x="954" y="270">Creates:</text><text class="code" x="954" y="300">illumina.samplesheet.csv</text><text class="code" x="954" y="327">illumina.auto.yml</text><text class="body" x="954" y="354">The YAML saves checked paths and choices.</text>
  <path d="M1138 390 V404 H25 V562 H42" stroke="#0f766e" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <text class="lane" x="54" y="440">REAL ANALYSIS AND REVIEW</text><line x1="54" y1="454" x2="1346" y2="454" stroke="#99f6e4" stroke-width="3"/>
  <g filter="url(#shadow)"><rect x="54" y="477" width="372" height="170" rx="16" fill="#fff"/></g><circle cx="91" cy="515" r="22" fill="#0f766e"/><text class="num" x="85" y="522">5</text><text class="title" x="126" y="521">Run the workflow</text>
  <text class="body" x="78" y="558">Alignment → CNA calling → boundary</text><text class="body" x="78" y="582">refinement → plots → reports</text><rect x="78" y="603" width="324" height="27" rx="7" fill="#ecfdf5"/><text class="code" x="94" y="622">-params-file illumina.auto.yml</text>
  <path d="M438 562 H478" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="492" y="477" width="372" height="170" rx="16" fill="#fff"/></g><circle cx="529" cy="515" r="22" fill="#0f766e"/><text class="num" x="523" y="522">6</text><text class="title" x="564" y="521">Verify all 12 samples</text>
  <text class="body" x="516" y="558">The verifier checks required BAMs,</text><text class="body" x="516" y="582">segments, tables, plots, and reports.</text><circle cx="535" cy="616" r="13" fill="#16a34a"/><path d="M529 616l4 4 9-11" fill="none" stroke="#fff" stroke-width="2.5"/><text class="code" x="558" y="622">SUCCESS</text>
  <path d="M876 562 H916" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="930" y="477" width="416" height="170" rx="16" fill="#fff"/></g><circle cx="967" cy="515" r="22" fill="#0f766e"/><text class="num" x="961" y="522">7</text><text class="title" x="1002" y="521">Review results</text>
  <text class="body" x="954" y="558">Fitted CNA profiles</text><text class="body" x="954" y="582">Refinement statistics</text><text class="body" x="954" y="606">CNA-only research reports</text><line x1="1170" y1="599" x2="1314" y2="599" stroke="#334155" stroke-width="2"/><rect x="1190" y="599" width="31" height="12" fill="#2563eb"/><rect x="1242" y="582" width="42" height="17" fill="#ef4444"/>
  <rect x="54" y="682" width="1292" height="48" rx="12" fill="#ccfbf1"/><text class="banner" x="82" y="712">The YAML connects preparation to analysis: it records the checked inputs, selected settings, and results folder.</text>
</svg>
