  <rect width="1400" height="520" fill="#f1f5f9"/><rect width="1400" height="112" fill="url(#header)"/><text class="h1" x="54" y="47">Checkpoint: verify before interpreting results</text><text class="lead" x="54" y="79">Continue to the result gallery only after the verifier prints the green success message.</text>
