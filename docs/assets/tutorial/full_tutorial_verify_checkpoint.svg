<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Successful PRJNA754199 output verification</title>
  <desc id="desc">Terminal-style screenshot showing the PRJNA754199 verify outputs Python command and the exact success message that complete tutorial outputs are verified. A checklist states that all 12 sample names and required BAMs, CNA segments, tables, plots, and reports were found.</desc>
