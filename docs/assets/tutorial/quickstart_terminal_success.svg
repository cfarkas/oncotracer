<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Successful OncoTracer QuickStart verification</title>
  <desc id="desc">Terminal-style screenshot showing step eight of eight, all expected outputs found, followed by the exact success message that both public workflows completed and produced expected outputs. Illumina and Oxford Nanopore summary file paths are shown.</desc>
  <defs><linearGradient id="header" x1="0" x2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#134e4a"/></linearGradient><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity=".18"/></filter></defs>
  <style>.h1{font:700 32px system-ui,sans-serif;fill:#f8fafc}.lead{font:18px system-ui,sans-serif;fill:#cbd5e1}.term{font:16px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#e2e8f0}.success{fill:#86efac;font-weight:700}.label{font:700 15px system-ui,sans-serif;fill:#0f766e;letter-spacing:.08em}.body{font:17px system-ui,sans-serif;fill:#334155}</style>
  <rect width="1400" height="520" fill="#f1f5f9"/><rect width="1400" height="112" fill="url(#header)"/><text class="h1" x="54" y="47">What a completed QuickStart looks like</text><text class="lead" x="54" y="79">The exact absolute paths differ by computer; the final SUCCESS sentence should match.</text>
  <g filter="url(#shadow)"><rect x="54" y="145" width="920" height="310" rx="15" fill="#0b1220"/></g><rect x="54" y="145" width="920" height="48" rx="15" fill="#1e293b"/><rect x="54" y="178" width="920" height="15" fill="#1e293b"/><circle cx="83" cy="169" r="7" fill="#fb7185"/><circle cx="107" cy="169" r="7" fill="#fbbf24"/><circle cx="131" cy="169" r="7" fill="#4ade80"/><text x="402" y="176" font-family="system-ui,sans-serif" font-size="15" fill="#cbd5e1">student — Terminal</text>
  <text class="term success" x="82" y="236">[8/8] All expected outputs found</text><rect x="82" y="261" width="864" height="70" rx="10" fill="#123527" stroke="#4ade80"/><circle cx="111" cy="296" r="16" fill="#16a34a"/><path d="M103 296l6 6 12-15" fill="none" stroke="#fff" stroke-width="3"/><text class="term success" x="140" y="302">SUCCESS: both public workflows completed and produced the expected outputs.</text>
