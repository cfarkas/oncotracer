<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">Why the QuickStart generates two YAML files</title>
  <desc id="desc">The known QuickStart inputs are prepared into one Illumina samplesheet and two YAML run plans. The Illumina YAML points to paired reads and selects qDNAseq at 100 kilobases. The Oxford Nanopore YAML points to a barcode folder and selects ichorCNA at 500 kilobases. Nextflow reads one YAML at a time using params file. YAML files contain paths and settings, not sequencing reads.</desc>
  <defs><linearGradient id="header" x1="0" x2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#134e4a"/></linearGradient><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity=".14"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#0f766e"/></marker></defs>
  <style>.h1{font:700 33px system-ui,sans-serif;fill:#f8fafc}.lead{font:18px system-ui,sans-serif;fill:#cbd5e1}.label{font:700 14px system-ui,sans-serif;fill:#0f766e;letter-spacing:.08em}.title{font:700 22px system-ui,sans-serif;fill:#0f172a}.body{font:16px system-ui,sans-serif;fill:#475569}.small{font:14px system-ui,sans-serif;fill:#64748b}.code{font:14px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#334155}.key{font:700 14px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#0f766e}.banner{font:700 18px system-ui,sans-serif;fill:#115e59}</style>
  <rect width="1400" height="720" fill="#f1f5f9"/><rect width="1400" height="112" fill="url(#header)"/><text class="h1" x="54" y="47">Why does the QuickStart generate two YAML files?</text><text class="lead" x="54" y="79">The public examples use different technologies, inputs, callers, and bin sizes, so each needs its own saved run plan.</text>
  <g filter="url(#shadow)"><rect x="54" y="150" width="310" height="480" rx="17" fill="#fff"/></g><text class="label" x="82" y="190">KNOWN EXAMPLE INPUTS</text><text class="title" x="82" y="225">Prepared by --make_test</text>
  <rect x="82" y="254" width="254" height="115" rx="11" fill="#eff6ff" stroke="#93c5fd"/><text x="102" y="284" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">Illumina ERR12341627</text><text class="code" x="102" y="315">R1.fastq.gz</text><text class="code" x="102" y="341">R2.fastq.gz</text>
  <rect x="82" y="392" width="254" height="115" rx="11" fill="#f5f3ff" stroke="#c4b5fd"/><text x="102" y="422" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#6d28d9">ONT DRR165691</text><text class="code" x="102" y="453">barcode01/</text><text class="code" x="122" y="479">reads.fastq.gz</text>
  <rect x="82" y="530" width="254" height="66" rx="11" fill="#f8fafc" stroke="#cbd5e1"/><text class="code" x="102" y="558">illumina.samplesheet.csv</text><text class="small" x="102" y="581">maps R1 + R2 to the sample</text>
  <path d="M382 390 H438" stroke="#0f766e" stroke-width="5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="460" y="150" width="440" height="480" rx="17" fill="#fffbeb" stroke="#f59e0b" stroke-width="3"/></g><text class="label" x="490" y="190">TWO GENERATED RUN PLANS</text><text class="title" x="490" y="225">YAML saves exact fields</text>
  <rect x="490" y="252" width="380" height="160" rx="11" fill="#fff" stroke="#93c5fd"/><text x="512" y="280" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="15" font-weight="700" fill="#1d4ed8">illumina.quickstart.yml</text><text class="key" x="512" y="308">mode:</text><text class="code" x="568" y="308">illumina</text><text class="key" x="512" y="332">illumina_samplesheet:</text><text class="code" x="530" y="356">.../illumina.samplesheet.csv</text><text class="key" x="512" y="380">illumina_caller:</text><text class="code" x="660" y="380">qdnaseq</text><text class="key" x="512" y="402">illumina_binsize_kb:</text><text class="code" x="696" y="402">100</text>
  <rect x="490" y="425" width="380" height="160" rx="11" fill="#fff" stroke="#c4b5fd"/><text x="512" y="453" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="15" font-weight="700" fill="#6d28d9">ont.quickstart.yml</text><text class="key" x="512" y="481">mode:</text><text class="code" x="568" y="481">ont</text><text class="key" x="512" y="505">ont_folder:</text><text class="code" x="615" y="505">.../fastq_pass</text><text class="key" x="512" y="529">ont_caller:</text><text class="code" x="615" y="529">ichorcna</text><text class="key" x="512" y="553">ont_binsize_kb:</text><text class="code" x="650" y="553">500</text>
  <text class="small" x="490" y="605">The YAML contains no read data. It is plain text.</text>
  <path d="M918 390 H974" stroke="#0f766e" stroke-width="5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="996" y="150" width="350" height="480" rx="17" fill="#fff"/></g><text class="label" x="1024" y="190">NEXTFLOW READS ONE PLAN</text><text class="title" x="1024" y="225">Run each route in turn</text>
  <rect x="1024" y="254" width="294" height="105" rx="10" fill="#111827"/><text x="1043" y="284" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="13.5" fill="#e2e8f0">nextflow run main.nf --docker</text><text x="1043" y="311" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="13.5" fill="#99f6e4">  -params-file ...yml</text><text x="1043" y="338" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="13.5" fill="#e2e8f0">  -resume</text>
  <circle cx="1040" cy="404" r="12" fill="#0f766e"/><path d="M1034 404l4 4 9-11" fill="none" stroke="#fff" stroke-width="2"/><text class="body" x="1062" y="410">find the correct reads</text><circle cx="1040" cy="446" r="12" fill="#0f766e"/><path d="M1034 446l4 4 9-11" fill="none" stroke="#fff" stroke-width="2"/><text class="body" x="1062" y="452">choose the caller</text><circle cx="1040" cy="488" r="12" fill="#0f766e"/><path d="M1034 488l4 4 9-11" fill="none" stroke="#fff" stroke-width="2"/><text class="body" x="1062" y="494">save in the right folder</text><circle cx="1040" cy="530" r="12" fill="#0f766e"/><path d="M1034 530l4 4 9-11" fill="none" stroke="#fff" stroke-width="2"/><text class="body" x="1062" y="536">reuse unchanged tasks</text>
  <text class="small" x="1024" y="580">-resume can reuse unchanged tasks</text><text class="small" x="1024" y="602">when the same work directory is kept.</text>
  <rect x="54" y="657" width="1292" height="42" rx="11" fill="#ccfbf1"/><text class="banner" x="82" y="684">FASTQs hold sequencing reads. The samplesheet maps files to a sample. YAML tells Nextflow how and where to run.</text>
</svg>
